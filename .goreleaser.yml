# GoReleaser configuration for cmt
version: 2

project_name: cmt

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # Optional: exclude specific combinations
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
    main: ./main.go
    binary: cmt

archives:
  - id: default
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
    builds_info:
      group: root
      owner: root

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^refactor:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

# GitHub release configuration
release:
  github:
    owner: yarlson
    name: cmt
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## cmt {{.Tag}}

    Generate meaningful git commit messages with Claude Code.

    ### Installation

    ```bash
    # Quick install
    curl -sSL https://raw.githubusercontent.com/yarlson/cmt/master/install.sh | bash

    # Homebrew
    brew tap yarlson/homebrew-tap
    brew install cmt

    # Manual download
    # Download the appropriate archive for your platform from the assets below
    # Extract and move to your PATH:
    # tar -xzf cmt_*.tar.gz && sudo mv cmt /usr/local/bin/
    ```

  footer: |
    ---
    **Full Changelog**: https://github.com/yarlson/cmt/compare/{{.PreviousTag}}...{{.Tag}}

# Homebrew tap
brews:
  - repository:
      owner: yarlson
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/yarlson/cmt"
    description: "Generate meaningful git commit messages with Claude Code"
    license: "MIT"
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    test: |
      system "#{bin}/cmt --version"
    install: |
      bin.install "cmt"

